<div *ngIf="result" class="results-wrapper">

  <mat-divider class="results-divider"></mat-divider>

  <h2 class="results-heading">
    <mat-icon>assessment</mat-icon>
    Analysis Results
  </h2>

  <!-- Summary -->
  <mat-card class="summary-card" appearance="outlined">
    <mat-card-content>
      <p class="summary-text">{{ result.summary }}</p>
    </mat-card-content>
  </mat-card>

  <!-- Strengths & Improvements side by side -->
  <div class="two-col">

    <mat-card appearance="outlined" class="section-card">
      <div class="section-head strengths-head">
        <mat-icon>verified</mat-icon>
        <span>Strong Points</span>
      </div>
      <mat-card-content>
        <div class="item-row" *ngFor="let s of result.strengths">
          <mat-icon class="item-icon strengths-c">check_circle</mat-icon>
          <span>{{ s }}</span>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card appearance="outlined" class="section-card">
      <div class="section-head improvements-head">
        <mat-icon>report_problem</mat-icon>
        <span>Areas for Improvement</span>
      </div>
      <mat-card-content>
        <div class="item-row" *ngFor="let item of result.improvements">
          <mat-icon class="item-icon improvements-c">warning_amber</mat-icon>
          <span>{{ item }}</span>
        </div>
      </mat-card-content>
    </mat-card>

  </div>

  <!-- Suggestions -->
  <mat-card appearance="outlined" class="section-card">
    <div class="section-head suggestions-head">
      <mat-icon>tips_and_updates</mat-icon>
      <span>Suggestions for Improvement</span>
    </div>
    <mat-card-content>
      <div class="item-row" *ngFor="let tip of result.suggestions; let i = index">
        <span class="tip-num">{{ i + 1 }}</span>
        <span>{{ tip }}</span>
      </div>
    </mat-card-content>
  </mat-card>

</div>
